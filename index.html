<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ravan Lanka Pvt Ltd</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a5e28;
      --ember: #e05c1a;
      --bg: #000000;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* Radial glow behind content */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 100% 60% at 50% 80%, rgba(224,92,26,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Animated noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      animation: grain 0.8s steps(2) infinite;
    }
    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      25% { transform: translate(-2%,-1%); }
      50% { transform: translate(1%,2%); }
      75% { transform: translate(2%,-1%); }
    }

    /* Decorative top & bottom lines */
    .line-h {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.4;
    }
    .line-h.top { top: 40px; }
    .line-h.bottom { bottom: 40px; }

    .line-v {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--gold-dim), transparent);
      opacity: 0.3;
    }
    .line-v.left { left: 40px; }
    .line-v.right { right: 40px; }

    /* Corner ornaments */
    .corner {
      position: fixed;
      width: 30px; height: 30px;
      border-color: var(--gold-dim);
      border-style: solid;
      opacity: 0.5;
    }
    .corner.tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

    /* Central content */
    .center {
      text-align: center;
      position: relative;
      padding: 60px 40px;
      animation: fadeIn 2s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Decorative divider */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 22px auto;
    }
    .ornament .bar {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament .bar.rev {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament .diamond {
      width: 8px; height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold-light);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--gold-light); }
      50% { box-shadow: 0 0 18px var(--gold-light), 0 0 30px rgba(201,168,76,0.3); }
    }

    /* Headings */
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.25));
    }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 3vw, 1.55rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.65);
      margin-top: 6px;
    }

    /* Ember dots floating */
    .sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .spark {
      position: absolute;
      bottom: -10px;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--gold-light);
      animation: rise linear infinite;
      opacity: 0;
    }
    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }
  </style>
</head>
<body>

  <!-- Frame -->
  <div class="line-h top"></div>
  <div class="line-h bottom"></div>
  <div class="line-v left"></div>
  <div class="line-v right"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Floating sparks -->
  <div class="sparks" id="sparks"></div>

  <!-- Main content -->
  <div class="center">
    <h1>Ravan Lanka<br>Pvt Ltd</h1>

    <div class="ornament">
      <div class="bar rev"></div>
      <div class="diamond"></div>
      <div class="bar"></div>
    </div>

    <h2>Website Under Construction</h2>
  </div>

  <script>
    // Generate floating spark particles
    const container = document.getElementById('sparks');
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = Math.random() * 100 + '%';
      s.style.animationDuration = (6 + Math.random() * 10) + 's';
      s.style.animationDelay = (Math.random() * 10) + 's';
      s.style.width = s.style.height = (1 + Math.random() * 2.5) + 'px';
      s.style.background = Math.random() > 0.5 ? '#c9a84c' : '#e8c97a';
      container.appendChild(s);
    }
  </script>
</body>
</html>
