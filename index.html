<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ravan Lanka</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080508;
      overflow: hidden;
      font-family: 'Cinzel', serif;
    }

    body::after {
      content: '';
      position: fixed; bottom: 0; left: 0; right: 0; height: 180px;
      background: radial-gradient(ellipse 70% 100% at 50% 100%, #ff450018 0%, transparent 100%);
      pointer-events: none;
    }

    .sparks { position: fixed; inset: 0; pointer-events: none; }
    .s {
      position: absolute; bottom: -6px;
      width: 2px; height: 2px; border-radius: 50%;
      background: #f0c060;
      box-shadow: 0 0 5px 2px #ff4500;
      animation: up linear infinite;
    }
    @keyframes up {
      to { transform: translateY(-100vh) translateX(var(--d)) scale(0); opacity: 0; }
    }

    .center {
      position: relative; z-index: 10;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.2rem;
    }

    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-weight: 900;
      font-size: clamp(3rem, 12vw, 8rem);
      line-height: 1;
      background: linear-gradient(180deg, #ffe8a0 0%, #c9933a 55%, #7a4010 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px #c9933a66);
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 20px #c9933a44); }
      to   { filter: drop-shadow(0 0 45px #c9933aaa); }
    }

    .line {
      width: clamp(200px, 50vw, 420px); height: 1px;
      background: linear-gradient(90deg, transparent, #c9933a88, transparent);
    }

    p {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.82rem);
      letter-spacing: 0.5em;
      color: #c9933a;
      text-transform: uppercase;
      opacity: 0.75;
      animation: fade 2s ease-in-out infinite alternate;
    }
    @keyframes fade {
      from { opacity: 0.5; }
      to   { opacity: 0.9; }
    }
  </style>
</head>
<body>

<div class="sparks" id="sparks"></div>

<div class="center">
  <h1>Ravan Lanka</h1>
  <div class="line"></div>
  <p>Website Under Construction</p>
</div>

<script>
  const c = document.getElementById('sparks');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 's';
    const dur = 4 + Math.random() * 6;
    const sz = 1.5 + Math.random() * 2.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      animation-duration:${dur}s;
      animation-delay:-${Math.random()*dur}s;
      --d:${(Math.random()-.5)*100}px;
    `;
    c.appendChild(s);
  }
</script>
</body>
</html>
